# ─── Datasource ──────────────────────────────────────────────────────────────
# Using H2 file-based DB for the runnable jar; swap for a real JDBC URL in production.
spring.datasource.url=jdbc:h2:file:./data/exportdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── Schema initialisation ───────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ─── H2 console (useful during development) ──────────────────────────────────
spring.h2.console.enabled=true

# ─── Export job configuration ─────────────────────────────────────────────────
# Directory where the positional (mainframe) file will be written (created if absent)
app.output.directory=/tmp/export-output

# Filename template – {param} is replaced with the runtime argument
app.output.filename=export_{param}.dat

# Filter applied to the person table
app.filter.status=ACTIVE

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.example.export=INFO
