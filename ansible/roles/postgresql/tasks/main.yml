---
- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - lsb-release
      - python3-psycopg2
    state: present
    update_cache: true

- name: Create PGDG keyring directory
  file:
    path: /usr/share/postgresql-common/pgdg
    state: directory
    mode: "0755"

- name: Download PGDG signing key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
    mode: "0644"

- name: Add PGDG apt repository
  apt_repository:
    repo: >-
      deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc]
      https://apt.postgresql.org/pub/repos/apt
      {{ ansible_distribution_release }}-pgdg main
    filename: pgdg
    state: present

- name: Install PostgreSQL 16
  apt:
    name: postgresql-16
    state: present
    update_cache: true

- name: Start and enable PostgreSQL service
  service:
    name: postgresql
    state: started
    enabled: true

- name: Deploy postgresql.conf tuning
  template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/16/main/postgresql.conf
    owner: postgres
    group: postgres
    mode: "0644"
  notify: restart postgresql

- name: Deploy pg_hba.conf (allow benchuser from any host)
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/16/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart postgresql

- name: Flush handlers to apply configuration before creating DB objects
  meta: flush_handlers

- name: Wait for PostgreSQL to be ready after restart
  wait_for:
    path: /var/run/postgresql/.s.PGSQL.5432
    state: present
    timeout: 30

- name: Create benchmark database
  postgresql_db:
    name: benchdb
    state: present
  become_user: postgres

- name: Create benchmark user
  postgresql_user:
    name: benchuser
    password: "{{ bench_user_password }}"
    state: present
  become_user: postgres

- name: Grant privileges on benchmark database to benchmark user
  postgresql_privs:
    db: benchdb
    role: benchuser
    type: database
    privs: ALL
    state: present
  become_user: postgres
